<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Government College of Engineering, Keonjhar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #E6F1FB;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .dot-bg {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #378ADD 1.2px, transparent 1.2px);
    background-size: 28px 28px;
    opacity: 0.1;
    pointer-events: none;
    z-index: 0;
  }

  .phone {
    position: relative;
    z-index: 1;
    width: 300px;
    height: 600px;
    background: #1c1c1e;
    border-radius: 44px;
    padding: 10px;
    box-shadow: 0 0 0 1px #333, 0 32px 80px rgba(4,44,83,0.18);
    animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  .phone-inner {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border-radius: 36px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 28px;
    position: relative;
  }

  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 26px;
    background: #1c1c1e;
    border-radius: 0 0 18px 18px;
    z-index: 10;
  }

  .phone-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #B5D4F4 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.35;
    pointer-events: none;
  }

  .phone-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
  }

  .badge {
    display: inline-block;
    border: 1.5px solid #378ADD;
    border-radius: 6px;
    padding: 3px 13px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.5s 0.4s forwards;
  }
  .badge span {
    font-size: 10px;
    font-weight: 500;
    color: #0C447C;
    letter-spacing: 2.5px;
  }

  .govt {
    font-size: 9px;
    color: #185FA5;
    letter-spacing: 3px;
    font-weight: 400;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.5s 0.5s forwards;
  }

  .name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    color: #042C53;
    line-height: 1.15;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.6s 0.6s forwards;
  }

  .bar {
    width: 100px;
    height: 2px;
    background: #378ADD;
    border-radius: 2px;
    margin: 0 auto 10px;
    opacity: 0;
    animation: expandBar 0.6s 0.85s forwards;
  }

  .location {
    font-size: 11px;
    color: #185FA5;
    letter-spacing: 1.5px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.5s 0.95s forwards;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #B5D4F4;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.4s 1.05s forwards;
  }

  .visit-btn {
    display: block;
    width: 100%;
    background: #0C447C;
    color: #ffffff;
    text-align: center;
    padding: 13px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.4px;
    transition: background 0.2s, transform 0.15s;
    opacity: 0;
    animation: fadeUp 0.5s 1.1s forwards;
  }
  .visit-btn:hover { background: #042C53; transform: translateY(-1px); }
  .visit-btn:active { transform: scale(0.97); }

  .sub-url {
    font-size: 10px;
    color: #378ADD;
    margin-top: 10px;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.4s 1.2s forwards;
  }

  .home-bar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: #D3D1C7;
    border-radius: 3px;
    z-index: 2;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandBar {
    from { opacity: 0; width: 0; }
    to   { opacity: 1; width: 100px; }
  }

  @media (max-height: 650px) {
    .phone { transform: scale(0.82); }
  }
  @media (max-width: 340px) {
    .phone { transform: scale(0.82); }
  }
</style>
</head>
<body>

<div class="dot-bg"></div>

<div class="phone">
  <div class="phone-inner">
    <div class="notch"></div>
    <div class="phone-dots"></div>

    <div class="phone-content">
      <div class="badge"><span>GCEK</span></div>
      <p class="govt">GOVERNMENT</p>
      <h1 class="name">College of<br>Engineering</h1>
      <div class="bar"></div>
      <p class="location">Keonjhar, Odisha</p>
      <div class="divider"></div>
      <a class="visit-btn" href="https://gcekjr-website.vercel.app/" target="_blank" rel="noopener">
        Visit Website &rarr;
      </a>
      <p class="sub-url">gcekjr.ac.in</p>
    </div>

    <div class="home-bar"></div>
  </div>
</div>

</body>
</html>
