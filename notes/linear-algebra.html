            <h1>Singular Value Decomposition (SVD)</h1>
            <a href="https://github.com/your-code" class="btn">[View GitHub Code]</a>
        </div>
        <section>
            <p>SVD is essential for dimensionality reduction. It factorizes matrix A into:</p>
            <div class="math-block">$$ A = U \Sigma V^T $$</div>
            <p>Notes: U is orthogonal, Sigma is diagonal, V is orthogonal.</p>
        </section>
